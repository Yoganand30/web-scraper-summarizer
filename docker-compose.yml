version: "3.9"

services:

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/scraperdb

  db:
    image: postgres:15.6
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scraperdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: